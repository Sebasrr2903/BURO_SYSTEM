<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>BURÓ SYSTEM</title>
    {% if error %}

    <div class="alert alert-danger">

        {{ error }}

    </div>

    {% endif %}

    <link
    rel="icon"
    type="image/png"
    href="/static/img/icon2.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container vh-100">

    <div class="row h-100 justify-content-center align-items-center">

        <div class="col-md-4">

            <div class="card shadow-lg border-0">

                <div class="card-body p-5">

                    <div class="text-center mb-4">

                        <h2 class="fw-bold">
                            📄 BURÓ SYSTEM
                        </h2>

                        <p class="text-muted">
                            Inicia sesión para continuar
                        </p>

                    </div>

                    <form method="POST">

                        {% csrf_token %}

                        <div class="mb-3">

                            <label class="form-label">
                                Usuario
                            </label>

                            <input
                                type="text"
                                name="username"
                                class="form-control"
                                required>

                        </div>

                        <div class="mb-4">

                            <label class="form-label">
                                Contraseña
                            </label>

                            <input
                                type="password"
                                name="password"
                                class="form-control"
                                required>

                        </div>

                        <button
                            type="submit"
                            class="btn btn-dark w-100">

                            Ingresar

                        </button>

                    </form>

                </div>

            </div>

            <div class="text-center mt-3 text-muted">

                © 2026 Sebastian Rodriguez

            </div>

        </div>

    </div>

</div>

</body>
</html>
